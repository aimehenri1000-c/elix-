<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription – Elix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="logo">Elix</a>
    <div class="nav-links">
      <a href="explore.html">Explorer</a>
      <a href="login.html" class="btn-outline">Connexion</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <span class="auth-logo">Elix</span>
      <p class="auth-subtitle">Créez votre compte gratuitement</p>

      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" placeholder="votre_pseudo" />
      </div>
      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" placeholder="votre@email.com" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Je suis</label>
        <select>
          <option value="">Choisir...</option>
          <option value="fan">Abonné (fan)</option>
          <option value="creator">Créatrice de contenu</option>
        </select>
      </div>

      <div class="age-check">
        <input type="checkbox" id="ageCheck" />
        <label for="ageCheck">Je confirme avoir <strong>18 ans ou plus</strong> et accepte les <a href="#" style="color:var(--accent)">CGU</a> d'Elix.</label>
      </div>

      <button class="form-submit" onclick="handleRegister()">Créer mon compte</button>

      <div class="auth-footer">
        Déjà un compte ? <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <script>
    function handleRegister() {
      const ageCheck = document.getElementById('ageCheck');
      if (!ageCheck.checked) {
        alert('Vous devez confirmer avoir 18 ans ou plus pour accéder à Elix.');
        return;
      }
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
